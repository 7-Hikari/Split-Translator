name: Build Windows Application
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install MSYS2 & Tesseract Dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-tesseract

      - name: Build Application
        run: |
          $env:CGO_ENABLED="1"
          
          # Menggunakan compiler Clang dari MSYS2 yang membawa paket Tesseract + Leptonica lengkap
          $env:PATH="C:\msys64\clang64\bin;C:\msys64\usr\bin;" + $env:PATH
          
          # Mengarahkan CGO ke jalur MSYS2 Clang64
          $env:CGO_CFLAGS="-I/c/msys64/clang64/include"
          $env:CGO_LDFLAGS="-L/c/msys64/clang64/lib -ltesseract"
          
          cd go
          go run github.com/wailsapp/wails/v2/cmd/wails@latest build -platform windows/amd64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: go/build/bin/*.exe