<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF OCR & Translator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* Header Toolbar */
        header { background: #2c3e50; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }

        /* Container Utama Dua Panel */
        .main-container { display: flex; flex: 1; overflow: hidden; background: #f5f6fa; }

        /* Pengaturan Panel Kiri & Kanan */
        .panel { width: 50%; height: 100%; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .panel-kiri { border-right: 2px solid #dcdde1; background: #7f8c8d; /* Warna background abu-abu khas PDF viewer */ }
        .panel-kanan { background: #ffffff; }

        /* Wadah Dokumen */
        .pdf-page-mock { background: white; width: 100%; max-width: 600px; height: 800px; margin: 0 auto 20px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; justify-content: center; align-items: center; font-size: 24px; color: #7f8c8d; }
        .terjemahan-box { font-size: 16px; line-height: 1.6; color: #2c3e50; }
    </style>
</head>
<body>

    <header>
        <h2>PDF Translator App</h2>
        <button id="reset">Reset</button>
        <div>Halaman Aktif: <span id="page-indicator">1</span></div>
        <div class="controls">
            <span class="page-info">
                Menuju ke :
                <input type="number" id="input-halaman" min="1" value="1" style="width: 60px; text-align: center;">
                dari <span id="total-halaman">0</span>
                <button id="btn-go">Go</button>
            </span>
        </div>

        <div style="display: flex; align-items: center; margin-left: 20px;">
            <select id="from-language" style="margin-right: 8px;"></select>
            <label style="margin-right: 10px;" name="local-translation">To </label>
            <select id="to-language" style="margin-right: 8px;"></select>
        </div>
    </header>

    <div class="main-container">
        <div class="panel panel-kiri" id="panel-pdf">
            <input type="file" id="file-input" accept="application/pdf" style="display: none;">

            <div id="drop-zone" style="border: 3px dashed #3498db; background: #ffffff; padding: 40px; text-align: center; border-radius: 10px; margin: auto; max-width: 80px; width: 80%; cursor: pointer; color: #2c3e50;">
                <p id="drop-zone-text-1" style="font-size: 18px; font-weight: bold; margin-bottom: 10px;">Tarik & Lepas File PDF di Sini</p>
                <p id="drop-zone-text-2" style="font-size: 14px; color: #7f8c8d;">atau klik untuk memilih file</p>
            </div>

            <div id="pdf-pages-container" style="display: none; width: 100%;"></div>
        </div>
        <div class="panel panel-kanan" id="panel-terjemahan">
            <div class="terjemahan-box">
                <h3>Hasil Terjemahan</h3>
                <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
                <p id="output-teks">Hasil terjemahan halaman 1 akan muncul di sini secara otomatis saat Anda melakukan scroll.</p>
            </div>
        </div>
    </div>

    <script src="./src/main.js" type="module"></script>
</body>
</html>
